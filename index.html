<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>非人类测试</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.5); }
        }
        @keyframes reveal-in {
            0% { opacity: 0; transform: scale(0.3) rotateY(90deg); }
            50% { opacity: 1; transform: scale(1.1) rotateY(0deg); }
            70% { transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1) rotateY(0deg); }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes sparkle-fade {
            0% { opacity: 0; transform: translateY(20px) scale(0.8); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(-45deg, #0a0a1a, #1a0a2e, #0a1628, #0a0a1a);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            color: #fff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ===== Stars ===== */
        #stars-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== Container ===== */
        #app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            gap: 20px;
        }

        /* ===== Header ===== */
        header {
            text-align: center;
            animation: sparkle-fade 1s ease-out;
        }
        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
        }
        header .subtitle {
            margin-top: 8px;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }

        /* ===== Main Button ===== */
        #button-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #button-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #progress-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.08);
            stroke-width: 6;
        }
        .ring-progress {
            fill: none;
            stroke: url(#progress-gradient);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 596.9;
            stroke-dashoffset: 596.9;
            transition: none;
        }
        .ring-glow {
            fill: none;
            stroke: rgba(255, 215, 0, 0.25);
            stroke-width: 14;
            stroke-linecap: round;
            stroke-dasharray: 596.9;
            stroke-dashoffset: 596.9;
            filter: blur(6px);
            transition: none;
        }

        #press-button {
            width: 148px;
            height: 148px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
            border: 2px solid rgba(255,255,255,0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            animation: pulse-glow 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
            touch-action: none;
        }
        #press-button:active,
        #press-button.active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }
        #press-button .icon {
            font-size: 2.2rem;
            margin-bottom: 4px;
        }
        #press-button .label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
        }
        #press-button .label .highlight {
            color: #ffd700;
        }

        #progress-text {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
            min-height: 1.4em;
            transition: color 0.3s;
        }
        #progress-text.active {
            color: #ffd700;
        }

        /* ===== Result ===== */
        #result-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }
        #result-wrapper.show {
            display: flex;
        }

        #result-emoji {
            font-size: 5rem;
            line-height: 1.2;
            animation: reveal-in 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.3));
        }
        #result-emoji.legendary {
            animation: reveal-in 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.6));
        }
        #result-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            animation: sparkle-fade 1.2s ease-out 0.3s both;
        }
        #result-name {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 3px;
            animation: sparkle-fade 1.2s ease-out 0.5s both;
        }
        #result-name .rarity-badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 12px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .rarity-common  { color: #a0a0a0; border: 1px solid rgba(160,160,160,0.3); }
        .rarity-uncommon{ color: #4fc3f7; border: 1px solid rgba(79,195,247,0.3); }
        .rarity-rare    { color: #ab47bc; border: 1px solid rgba(171,71,188,0.3); }
        .rarity-legendary{ color: #ffd700; border: 1px solid rgba(255,215,0,0.4); }

        #result-slogan {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.7);
            font-style: italic;
            letter-spacing: 1px;
            max-width: 320px;
            line-height: 1.6;
            animation: sparkle-fade 1.2s ease-out 0.7s both;
        }

        #result-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            animation: sparkle-fade 1.2s ease-out 0.9s both;
        }
        .btn {
            padding: 10px 28px;
            border-radius: 30px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 1px;
            font-family: inherit;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a0a2e;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }
        .btn-primary:active { transform: translateY(0) scale(0.95); }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }

        /* ===== Reset button ===== */
        #reset-area {
            position: fixed;
            bottom: 48px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 1;
            animation: sparkle-fade 1.5s ease-out 0.5s both;
        }
        .btn-reset {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 22px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            font-family: inherit;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
        }
        .btn-reset:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.85);
            border-color: rgba(255,255,255,0.35);
        }
        .btn-reset:active {
            transform: scale(0.93);
        }
        .btn-reset .icon { font-size: 0.9rem; }

        /* ===== Footer ===== */
        footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== Charging flash overlay ===== */
        #flash-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255,215,0,0.3), transparent 70%);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.1s;
        }
        #flash-overlay.fire {
            opacity: 1;
        }

        /* ===== Confetti canvas ===== */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* ===== Rarity colors for name ===== */
        .name-common    { color: #e0e0e0; }
        .name-uncommon  { color: #4fc3f7; }
        .name-rare      { color: #ce93d8; }
        .name-legendary { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.3); }

        /* ===== Responsive ===== */
        @media (max-width: 420px) {
            header h1 { font-size: 1.5rem; }
            #button-container { width: 170px; height: 170px; }
            #press-button { width: 126px; height: 126px; }
            #press-button .icon { font-size: 1.8rem; }
            #press-button .label { font-size: 0.8rem; }
            #result-emoji { font-size: 4rem; }
            #result-name { font-size: 1.8rem; }
            .ring-bg, .ring-progress, .ring-glow { stroke-width: 5; }
            .btn { padding: 8px 22px; font-size: 0.82rem; }
        }

        @media (max-height: 640px) {
            header h1 { font-size: 1.3rem; }
            header .subtitle { font-size: 0.8rem; margin-top: 4px; }
            #button-container { width: 150px; height: 150px; }
            #press-button { width: 112px; height: 112px; }
            #press-button .icon { font-size: 1.5rem; margin-bottom: 2px; }
            #press-button .label { font-size: 0.75rem; }
            #result-emoji { font-size: 3.5rem; }
            #result-name { font-size: 1.5rem; }
            #result-slogan { font-size: 0.9rem; }
            .ring-bg, .ring-progress, .ring-glow { stroke-width: 4; }
        }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="flash-overlay"></div>
<canvas id="confetti-canvas"></canvas>

<svg width="0" height="0" style="position:absolute">
    <defs>
        <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff6b35"/>
            <stop offset="50%" stop-color="#ffd700"/>
            <stop offset="100%" stop-color="#ffaa00"/>
        </linearGradient>
    </defs>
</svg>

<div id="app">

    <header>
        <h1>✦ 非人类测试 ✦</h1>
        <p class="subtitle">按住按钮，发现你内心深处的真实灵魂</p>
    </header>

    <!-- === Initial / Charge state === -->
    <div id="button-wrapper">
        <div id="button-container">
            <svg id="progress-ring" viewBox="0 0 200 200">
                <circle class="ring-bg" cx="100" cy="100" r="95"/>
                <circle class="ring-glow" cx="100" cy="100" r="95"/>
                <circle class="ring-progress" cx="100" cy="100" r="95"/>
            </svg>
            <div id="press-button" role="button" tabindex="0">
                <span class="icon">⚡</span>
                <span class="label">长按<span class="highlight">不放</span></span>
            </div>
        </div>
        <div id="progress-text">按住以开始</div>
    </div>

    <!-- === Result state === -->
    <div id="result-wrapper">
        <div id="result-emoji"></div>
        <div id="result-label">你的真身是...</div>
        <div id="result-name"></div>
        <div id="result-slogan"></div>
        <div id="result-actions">
            <button class="btn btn-primary" id="btn-retry">再测一次</button>
            <button class="btn btn-secondary" id="btn-share">分享结果</button>
        </div>
    </div>

    <div id="reset-area">
        <button class="btn-reset" id="btn-reset"><span class="icon">⟳</span> 重置结果</button>
    </div>

    <footer>※ 结果基于设备指纹生成，点击「重置结果」可刷新</footer>
</div>

<script>
(function () {
    'use strict';

    // ============================================================
    //  ANIMAL DATABASE  —  30 animals in 4 rarity tiers
    // ============================================================
    const TIER = { COMMON: 'common', UNCOMMON: 'uncommon', RARE: 'rare', LEGENDARY: 'legendary' };

    const animals = [
        // ── Common (weight 4) ──
        { id: 1,  emoji: '🐜', name: '蚂蚁',     tier: TIER.COMMON,   weight: 4, slogan: '渺小却撼动世界' },
        { id: 2,  emoji: '🐝', name: '蜜蜂',     tier: TIER.COMMON,   weight: 4, slogan: '忙碌是生命的勋章' },
        { id: 3,  emoji: '🐿️', name: '松鼠',    tier: TIER.COMMON,   weight: 4, slogan: '囤积快乐是一种远见' },
        { id: 4,  emoji: '🐦', name: '麻雀',     tier: TIER.COMMON,   weight: 4, slogan: '平凡也能飞上天空' },
        { id: 5,  emoji: '🐱', name: '猫',       tier: TIER.COMMON,   weight: 4, slogan: '优雅是慵懒最好的伪装' },

        { id: 8,  emoji: '🦋', name: '蝴蝶',     tier: TIER.COMMON,   weight: 4, slogan: '蜕变是生命永恒的底色' },
        { id: 9,  emoji: '🐢', name: '乌龟',     tier: TIER.COMMON,   weight: 4, slogan: '慢下来才能走得更远' },
        { id: 10, emoji: '🐌', name: '蜗牛',     tier: TIER.COMMON,   weight: 4, slogan: '背负重担也能走遍天下' },
        { id: 11, emoji: '🐹', name: '仓鼠',     tier: TIER.COMMON,   weight: 4, slogan: '不停地奔跑只为一点点快乐' },
        { id: 12, emoji: '🐠', name: '金鱼',     tier: TIER.COMMON,   weight: 4, slogan: '记忆虽短，快乐很长' },

        // ── Uncommon (weight 3) ──
        { id: 13, emoji: '🦊', name: '狐狸',     tier: TIER.UNCOMMON, weight: 3, slogan: '聪明是最高级的性感' },
        { id: 14, emoji: '🐺', name: '狼',       tier: TIER.UNCOMMON, weight: 3, slogan: '孤独是强者与生俱来的宿命' },
        { id: 15, emoji: '🦅', name: '鹰',       tier: TIER.UNCOMMON, weight: 3, slogan: '站得高是为了飞得更远' },
        { id: 16, emoji: '🐬', name: '海豚',     tier: TIER.UNCOMMON, weight: 3, slogan: '真正的智慧源于善良' },
        { id: 17, emoji: '🦚', name: '孔雀',     tier: TIER.UNCOMMON, weight: 3, slogan: '美不需要低调' },
        { id: 18, emoji: '🦌', name: '鹿',       tier: TIER.UNCOMMON, weight: 3, slogan: '优雅与警觉是生存的双翼' },
        { id: 19, emoji: '🐼', name: '熊猫',     tier: TIER.UNCOMMON, weight: 3, slogan: '黑白分明的人生不需要解释' },
        { id: 20, emoji: '🦁', name: '狮子',     tier: TIER.UNCOMMON, weight: 3, slogan: '王者从不需要证明自己' },
        { id: 21, emoji: '🐯', name: '老虎',     tier: TIER.UNCOMMON, weight: 3, slogan: '真正的力量懂得耐心等待' },

        // ── Rare (weight 2) ──
        { id: 22, emoji: '🐋', name: '鲸鱼',     tier: TIER.RARE,     weight: 2, slogan: '最孤独的声音能穿越整片海洋' },
        { id: 23, emoji: '🦎', name: '变色龙',   tier: TIER.RARE,     weight: 2, slogan: '改变自己是为了改变世界' },
        { id: 24, emoji: '🦉', name: '猫头鹰',   tier: TIER.RARE,     weight: 2, slogan: '真正的智者从不与黑夜为敌' },
        { id: 25, emoji: '🦩', name: '火烈鸟',   tier: TIER.RARE,     weight: 2, slogan: '特立独行本身就是一种优雅' },
        { id: 26, emoji: '🐻‍❄️', name: '北极熊',tier: TIER.RARE,     weight: 2, slogan: '在最寒冷的世界里保持温度' },
        { id: 27, emoji: '🐆', name: '雪豹',     tier: TIER.RARE,     weight: 2, slogan: '最高的山峰只留给最孤独的灵魂' },

        // ── Legendary (weight 1) ──
        { id: 28, emoji: '🦄', name: '独角兽',   tier: TIER.LEGENDARY, weight: 1, slogan: '只有相信奇迹的人才能看见' },
        { id: 29, emoji: '🐉', name: '龙',       tier: TIER.LEGENDARY, weight: 1, slogan: '我即是天命' },
        { id: 30, emoji: '🪶', name: '凤凰',     tier: TIER.LEGENDARY, weight: 1, slogan: '浴火重生，向死而生' },
    ];

    // ============================================================
    //  UTILITY FUNCTIONS
    // ============================================================

    /** Simple string hash (djb2). */
    function hashStr(str) {
        let hash = 5381;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) + hash) + str.charCodeAt(i);
            hash |= 0; // force 32-bit int
        }
        return Math.abs(hash);
    }

    /** Gather device fingerprint signals. */
    function getFingerprint() {
        const signals = [
            navigator.userAgent,
            navigator.language,
            navigator.platform,
            screen.width,
            screen.height,
            screen.colorDepth,
            navigator.hardwareConcurrency || '',
            navigator.deviceMemory || '',
        ];
        return signals.join('||');
    }

    /** Weighted random selection seeded by a hash value. */
    function pickAnimal(fingerprint) {
        const totalWeight = animals.reduce((s, a) => s + a.weight, 0);
        let value = hashStr(fingerprint) % totalWeight;
        for (const a of animals) {
            value -= a.weight;
            if (value < 0) return a;
        }
        return animals[animals.length - 1];
    }

    // ============================================================
    //  STARS BACKGROUND
    // ============================================================

    function initStars(canvas) {
        const ctx = canvas.getContext('2d');
        let w, h, stars;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            const count = Math.floor((w * h) / 6000);
            stars = Array.from({ length: count }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.6 + 0.4,
                alpha: Math.random() * 0.6 + 0.2,
                speed: Math.random() * 0.008 + 0.004,
                phase: Math.random() * Math.PI * 2,
            }));
        }

        function draw(time) {
            ctx.clearRect(0, 0, w, h);
            for (const s of stars) {
                const a = s.alpha * (0.5 + 0.5 * Math.sin(time * s.speed + s.phase));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${a})`;
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        resize();
        window.addEventListener('resize', resize);
        requestAnimationFrame(draw);
    }

    // ============================================================
    //  CONFETTI (simple canvas-based)
    // ============================================================

    function fireConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width = window.innerWidth;
        const h = canvas.height = window.innerHeight;

        const colors = ['#ffd700', '#ff6b35', '#4fc3f7', '#ab47bc', '#ff4081', '#69f0ae', '#ffd740'];
        const pieces = Array.from({ length: 80 }, () => ({
            x: w / 2 + (Math.random() - 0.5) * 200,
            y: h / 2 + (Math.random() - 0.5) * 100,
            vx: (Math.random() - 0.5) * 12,
            vy: -Math.random() * 14 - 4,
            w: Math.random() * 8 + 4,
            h: Math.random() * 6 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            rot: Math.random() * 360,
            rv: (Math.random() - 0.5) * 10,
            gravity: 0.35 + Math.random() * 0.15,
            drag: 0.96,
        }));

        let frame;

        function draw() {
            ctx.clearRect(0, 0, w, h);
            let alive = false;
            for (const p of pieces) {
                if (p.y > h + 20) continue;
                alive = true;
                p.vy += p.gravity;
                p.vx *= p.drag;
                p.vy *= p.drag;
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.rv;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rot * Math.PI) / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            }
            if (alive) {
                frame = requestAnimationFrame(draw);
            } else {
                ctx.clearRect(0, 0, w, h);
            }
        }
        cancelAnimationFrame(frame);
        frame = requestAnimationFrame(draw);
    }

    // ============================================================
    //  MAIN APP
    // ============================================================

    const C = 2 * Math.PI * 95; // ring circumference ~596.9

    const els = {
        buttonWrapper: document.getElementById('button-wrapper'),
        resultWrapper: document.getElementById('result-wrapper'),
        pressButton:   document.getElementById('press-button'),
        progressRing:  document.getElementById('progress-ring'),
        progressEl:    document.querySelector('.ring-progress'),
        glowEl:        document.querySelector('.ring-glow'),
        progressText:  document.getElementById('progress-text'),
        flashOverlay:  document.getElementById('flash-overlay'),

        resultEmoji:   document.getElementById('result-emoji'),
        resultLabel:   document.getElementById('result-label'),
        resultName:    document.getElementById('result-name'),
        resultSlogan:  document.getElementById('result-slogan'),
        btnRetry:      document.getElementById('btn-retry'),
        btnShare:      document.getElementById('btn-share'),
        btnReset:      document.getElementById('btn-reset'),
    };

    const RESET_KEY = 'nonhuman_reset_count';
    let charging = false;
    let chargeRAF = null;
    let progress = 0;
    const CHARGE_MS = 3000;

    let currentAnimal = null;

    // ---- Device-locked result (with optional reset counter) ----
    const fingerprint = getFingerprint();
    const resetCount = parseInt(localStorage.getItem(RESET_KEY) || '0', 10);
    const myAnimal = pickAnimal(fingerprint + ':' + resetCount);
    currentAnimal = myAnimal;

    // ---- Rendering helpers ----

    function setRingProgress(pct) {
        const offset = C * (1 - pct);
        els.progressEl.style.strokeDashoffset = offset;
        els.glowEl.style.strokeDashoffset = offset;
    }

    function updateProgressText(pct) {
        const n = Math.round(pct * 100);
        els.progressText.textContent = n < 100 ? `${n}%` : '充能完毕 ✦';
    }

    function showInitial() {
        els.buttonWrapper.style.display = 'flex';
        els.resultWrapper.classList.remove('show');
        els.resultWrapper.style.display = 'none';
        els.progressText.className = '';
        els.progressText.textContent = '按住以开始';
        els.pressButton.classList.remove('active');
        els.flashOverlay.classList.remove('fire');
    }

    function renderResult(animal) {
        els.buttonWrapper.style.display = 'none';
        els.resultWrapper.style.display = 'flex';
        // Force reflow for re-trigger animations
        void els.resultWrapper.offsetWidth;
        els.resultWrapper.classList.add('show');

        els.resultEmoji.textContent = animal.emoji;
        els.resultEmoji.className = animal.tier === TIER.LEGENDARY ? 'legendary' : '';

        const tierLabel = { common: '普通', uncommon: '稀有', rare: '罕见', legendary: '传说' }[animal.tier] || '';
        els.resultName.innerHTML = `${animal.name} <span class="rarity-badge rarity-${animal.tier}">${tierLabel}</span>`;
        els.resultName.className = `name-${animal.tier}`;

        els.resultSlogan.textContent = `「${animal.slogan}」`;

        if (animal.tier === TIER.LEGENDARY) {
            fireConfetti();
        }
    }

    // ---- Charge logic ----

    function startCharge() {
        if (charging) return;
        charging = true;
        progress = 0;
        els.pressButton.classList.add('active');
        els.progressText.className = 'active';
        updateProgressText(0);
        setRingProgress(0);

        const t0 = performance.now();

        function tick(now) {
            if (!charging) return;
            const elapsed = now - t0;
            progress = Math.min(elapsed / CHARGE_MS, 1);
            setRingProgress(progress);
            updateProgressText(progress);

            if (progress >= 1) {
                completeCharge();
            } else {
                chargeRAF = requestAnimationFrame(tick);
            }
        }

        chargeRAF = requestAnimationFrame(tick);
    }

    function cancelCharge() {
        if (!charging) return;
        charging = false;
        if (chargeRAF) { cancelAnimationFrame(chargeRAF); chargeRAF = null; }
        els.pressButton.classList.remove('active');
        els.progressText.className = '';
        progress = 0;
        setRingProgress(0);
        updateProgressText(0);
        // small haptic feedback feel via flash
    }

    function completeCharge() {
        charging = false;
        if (chargeRAF) { cancelAnimationFrame(chargeRAF); chargeRAF = null; }
        els.pressButton.classList.remove('active');

        // Flash
        els.flashOverlay.classList.add('fire');
        setTimeout(() => els.flashOverlay.classList.remove('fire'), 400);

        // Show result
        renderResult(currentAnimal);
    }

    // ---- Event binding ----

    function bindButton() {
        const btn = els.pressButton;
        // Pointer Events (modern browsers cover both mouse & touch)
        btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            btn.setPointerCapture(e.pointerId);
            startCharge();
        });
        btn.addEventListener('pointerup', (e) => {
            e.preventDefault();
            cancelCharge();
        });
        btn.addEventListener('pointercancel', (e) => {
            e.preventDefault();
            cancelCharge();
        });
        btn.addEventListener('pointerleave', (e) => {
            // only cancel if the button is not capturing (mouse leaving during press)
            if (!charging) return;
            // pointer capture should handle this, but just in case:
            // cancelCharge();  -- pointercancel already fires
        });

        // Keyboard support (Enter / Space)
        btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                startCharge();
            }
        });
        btn.addEventListener('keyup', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                cancelCharge();
            }
        });

        // Drag protection
        btn.addEventListener('dragstart', (e) => e.preventDefault());
    }

    function bindActions() {
        els.btnRetry.addEventListener('click', () => {
            showInitial();
        });
        els.btnShare.addEventListener('click', () => {
            const animal = currentAnimal;
            const tierLabel = { common: '普通', uncommon: '稀有', rare: '罕见', legendary: '传说' }[animal.tier] || '';
            const text = `✨ 非人类测试结果 ✨\n\n我的真身是：${animal.emoji} ${animal.name}（${tierLabel}）\n"${animal.slogan}"\n\n你也来测测你是什么动物→`;
            if (navigator.share) {
                navigator.share({ title: '非人类测试', text }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    const orig = els.btnShare.textContent;
                    els.btnShare.textContent = '已复制 ✓';
                    setTimeout(() => { els.btnShare.textContent = orig; }, 2000);
                }).catch(() => {});
            }
        });
        els.btnReset.addEventListener('click', doReset);
    }

    // ---- Reset ----

    function doReset() {
        // If currently charging, cancel first
        cancelCharge();
        const count = parseInt(localStorage.getItem(RESET_KEY) || '0', 10) + 1;
        localStorage.setItem(RESET_KEY, String(count));
        currentAnimal = pickAnimal(fingerprint + ':' + count);
        showInitial();
        // Visual feedback
        els.btnReset.style.transform = 'scale(0.93) rotate(180deg)';
        els.btnReset.style.opacity = '0.5';
        setTimeout(() => {
            els.btnReset.style.transform = '';
            els.btnReset.style.opacity = '';
        }, 300);
    }

    // ---- Init ----

    initStars(document.getElementById('stars-canvas'));
    bindButton();
    bindActions();
    showInitial();

    // Expose for debugging
    window.__nonhuman = { animals, myAnimal, fingerprint };

})();
</script>

</body>
</html>
